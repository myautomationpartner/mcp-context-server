version: "3.8"
# redeploy trigger

services:
  context-mcp:
    build: .
    container_name: context-mcp
    volumes:
      - context_data:/context
    restart: unless-stopped

  context-mcp-proxy:
    image: ghcr.io/sparfenyuk/mcp-proxy:latest
    container_name: context-mcp-proxy
    depends_on:
      - context-mcp
    command:
      - python
      - /app/server.py
    environment:
      MCP_PROXY_TRANSPORT: http
      MCP_PROXY_HTTP_PORT: "3333"
    ports:
      - "3333:3333"
    restart: unless-stopped

volumes:
  context_data: